<!doctype html>
<html lang="en">
  <head>
    <title>DomainVisuals 3D Viewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { margin: 0; }
      model-viewer { 
        width: 100%; 
        height: 100vh; 
        background-color: #f0f0f0;
      }
      
      /* Progress Bar Container */
      .progress-bar {
        display: block;
        width: 40%;
        height: 20px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 10px;
        background-color: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      /* Moving Blue Bar */
      .update-bar {
        background-color: #007bff;
        width: 0%;
        height: 100%;
        border-radius: 10px;
        transition: width 0.3s;
      }

      .download-text {
        position: absolute;
        top: -25px;
        width: 100%;
        color: #333;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
      }

      /* This class will be added by the script to hide the bar */
      .hide { 
        display: none !important; 
      }
    </style>
  </head>
  <body>
    <model-viewer 
      id="viewer"
      src="3DModel.obj.glb" 
      poster="poster.webp"
      loading="eager"
      reveal="auto"
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      camera-orbit="0deg 75deg 1.5m"
      tone-mapping="agx" 
      shadow-intensity="1">
      
      <div class="progress-bar" slot="progress-bar" id="progress-container">
          <div class="download-text">Downloading 3D Model...</div>
          <div class="update-bar" id="update-bar"></div>
      </div>

      <button slot="ar-button" id="ar-button" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">View in your space</button>
    </model-viewer>  

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <script>
      // This script handles the progress bar logic
      const modelViewer = document.querySelector('#viewer');
      const progressContainer = document.querySelector('#progress-container');
      const updateBar = document.querySelector('#update-bar');

      modelViewer.addEventListener('progress', (event) => {
        const { totalProgress } = event.detail;
        updateBar.style.width = `${totalProgress * 100}%`;
        
        if (totalProgress === 1) {
          // Hide the entire container once download is 100%
          progressContainer.classList.add('hide');
        }
      });
    </script>
  </body>
</html>
