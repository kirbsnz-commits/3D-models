<!doctype html>
<html lang="en">
  <head>
    <title>DomainVisuals 3D Viewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      body { margin: 0; }
      model-viewer { 
        width: 100%; 
        height: 95vh; 
        background-color: #f0f0f0;
      }
      
      /* Progress Bar Container */
      .progress-bar {
        display: block;
        width: 40%;
        height: 20px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 10px;
        background-color: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.5);
        text-align: center;
      }

      /* Moving Download Bar */
      .update-bar {
        background-color: #007bff;
        width: 0%;
        height: 100%;
        border-radius: 10px;
        transition: width 0.3s;
      }

      /* "Downloading" Text */
      .download-text {
        position: absolute;
        top: -25px;
        width: 100%;
        color: #333;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 14px;
      }

      .hide { display: none; }
    </style>
  </head>
  <body>
    <model-viewer 
      src="3DModel.obj.glb" 
      poster="poster.webp"
      loading="eager"
      reveal="auto"
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      camera-orbit="0deg 75deg 2m"
      tone-mapping="agx" 
      shadow-intensity="1">
      
      <div class="progress-bar" slot="progress-bar">
          <div class="download-text">Downloading 3D Model...</div>
          <div class="update-bar"></div>
      </div>

      <button slot="ar-button" id="ar-button">View in your space</button>
    </model-viewer>  

    <!-- Uses the stable model-viewer engine -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </body>
</html>
